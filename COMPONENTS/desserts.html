<!-- Tiramisu -->
<article class="menu-item has-customize"
  data-item="tiramisu"
  data-price="6.00"
  data-description="Mascarpone, café, cacao">
  
  <span class="emoji">🍫</span>
  
  <div class="item-info">
    <div class="price-name">
      <span class="price">6,00€</span>
      <span class="name">Tiramisu</span>
    </div>
  </div>
  
  <button class="customize-btn" onclick="openDessertModal(this.parentElement); event.stopPropagation();">
    🔧 Personnaliser
  </button>
  
  <div class="quantity">
    <button class="qty-minus">−</button>
    <span class="qty-value">1</span>
    <button class="qty-plus">+</button>
  </div>
</article>
