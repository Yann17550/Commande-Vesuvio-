<!-- COMPONENTS/desserts.html -->

<!-- Tiramisu -->
<article class="menu-item has-customize"
  data-item="tiramisu"
  data-price="6.00"
  data-description="Mascarpone, café, cacao">
  
  <div class="item-main">
    <div class="item-info">
      <div class="price-name">
        <span class="price">6,00€</span>
        <span class="name">Tiramisu</span>
      </div>
      <span class="description">Mascarpone, café, cacao</span>
    </div>
  </div>
  
  <div class="actions-row">
    <button class="customize-btn" onclick="openDessertModal(this.closest('.menu-item')); event.stopPropagation();">
      🔧 Personnaliser
    </button>
    <div class="quantity">
      <button class="qty-plus">+</button>
      <span class="qty-value">1</span>
      <button class="qty-minus">−</button>
    </div>
  </div>
</article>
