<!-- COMPONENTS/pizzas.html -->

<!-- Margherita -->
<article class="menu-item has-customize"
  data-item="margherita"
  data-price="10.00"
  data-description="Sauce tomate, Fior di latte"
  data-ingredients="tomate,mozzarella">
  
  <div class="item-main">
    <div class="item-info">
      <div class="price-name">
        <span class="price">10,00€</span>
        <span class="name">Margherita</span>
      </div>
      <span class="description">Sauce tomate, Fior di latte</span>
    </div>
  </div>
  
  <div class="actions-row">
    <button class="customize-btn" onclick="openPizzaModal(this.closest('.menu-item')); event.stopPropagation();">
      🔧 Personnaliser
    </button>
    <div class="quantity">
      <button class="qty-plus">+</button>
      <span class="qty-value">1</span>
      <button class="qty-minus">−</button>
    </div>
  </div>
</article>
