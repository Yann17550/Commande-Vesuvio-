<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vesuvio - Commande Table</title>
  
  <!-- CSS séparés avec chemins corrects -->
<link rel="stylesheet" href="./CSS - css/reset.css">
<link rel="stylesheet" href="./CSS - css/layout.css">
<link rel="stylesheet" href="./CSS - css/header.css">
<link rel="stylesheet" href="./CSS - css/tabs.css">
<link rel="stylesheet" href="./CSS - css/menu-items.css">
<link rel="stylesheet" href="./CSS - css/order-button.css">
<link rel="stylesheet" href="./CSS - css/ticket.css">

</head>
<body>
  <!-- Header -->
  <div id="header-container"></div>

  <!-- Tabs -->
  <div id="tabs-container"></div>

  <!-- Menu -->
  <main class="menu-container">
    <section class="category active" id="pizzas"></section>
    <section class="category" id="boissons"></section>
    <section class="category" id="desserts"></section>
  </main>

  <!-- Bouton Commander -->
  <button class="order-button" id="orderBtn">
    <span id="orderBtnText">Commander</span>
  </button>

  <!-- Ticket Cuisine -->
  <div class="ticket" id="ticketModal">
    <div class="ticket-content" id="ticketContent"></div>
  </div>

  <!-- JS séparés avec chemins corrects -->
  <script src="./JS - js/config.js"></script>
  <script src="./JS - js/tabs.js"></script>
  <script src="./JS - js/menu-items.js"></script>
  <script src="./JS - js/order.js"></script>
  <script src="./JS - js/ticket.js"></script>
  <script>
    // Initialisation au chargement
    document.addEventListener('DOMContentLoaded', async function() {
      await loadComponent('header-container', './COMPONENTS - components/header.html');
      await loadComponent('tabs-container', './COMPONENTS - components/tabs.html');
      await loadComponent('pizzas', './COMPONENTS - components/pizzas.html');
      await loadComponent('boissons', './COMPONENTS - components/boissons.html');
      await loadComponent('desserts', './COMPONENTS - components/desserts.html');
      
      // Initialiser les modules
      initTabs();
      initMenuItems();
      initOrder();
    });

    // Fonction pour charger composants HTML
    async function loadComponent(containerId, file) {
      try {
        const response = await fetch(file);
        const html = await response.text();
        document.getElementById(containerId).innerHTML = html;
      } catch (error) {
        console.error(`Erreur chargement ${file}:`, error);
      }
    }
  </script>
</body>
</html>
